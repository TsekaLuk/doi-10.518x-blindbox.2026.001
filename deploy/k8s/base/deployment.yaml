apiVersion: apps/v1
kind: Deployment
metadata:
  name: persona-blindbox-server
  labels:
    app.kubernetes.io/name: persona-blindbox-server
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: persona-blindbox-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: persona-blindbox-server
        app.kubernetes.io/component: api
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: persona-blindbox-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8787
          envFrom:
            - configMapRef:
                name: persona-blindbox-server-config
            - secretRef:
                name: persona-blindbox-runtime
          env:
            - name: DASHSCOPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: persona-blindbox-runtime
                  key: AI_API_KEY
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
